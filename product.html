<!DOCTYPE html>
<html>
    <head>
        <title>
          Product entry form
        </title>
        <link rel="icon" href="./assets/icon.png">
    </head>
    <body>
        <center><div>
            <form >
                <h1 style="color: darkslateblue;">PRODUCT DETAILS</h1>
            <table>
                <tr>
                    <td><label for="name"> PRODUCT NAME: </label></td>
                    <td><input type="text" id="name" name="product name" placeholder="enter product name"></td>
                </tr>
                <tr>
                    <td><label for="size"> SIZE: </label></td>
                    <td><input type="text" id="size" name="size" placeholder="enter size" ></td>
                </tr>
                <tr>
                    <td>
                        <label for="manufacture date "> MANUFACTURING DATE: </label>

                    </td>
                    <td>
                        <input type="date" id="manufacture date" name="manufacture date">   
                     </td>

                </tr>
                <tr>
                    <td>
                        <label for="expiry date">EXPIRY DATE:</label>
                    </td>
                    <td>
                        <input type="date" id="expiry date" name="expiry date">
                    </td>
                </tr>
                <tr>
                    <td>
                        <label for="price">AMOUNT:</label>

                    </td>
                    <td>
                        <input type="number" id="price" name="price">
                    </td>
                </tr>
                <tr>
                    <td><label for="need"> QUANTITY:</label></td>
                    <td><select name="quantity" id="need">
                        <option value="">select quantity</option>
                        <option value="1">1</option>
                        <option value="2">2</option>
                        <option value="3">3</option>
                    </select></td>
                </tr>
                <tr>
                    <td><label for="review">REVIEWS:</label></td>
                    <td><input type="file" name="review" id="review"></td>
                </tr>
                <tr >
                    <td></td>
                    <td><button type="submit" style="background-color: aquamarine;">submit</button>
                    <button type="reset" style="background-color: burlywood;">reset</button></td>
                </tr>
               

            </table>
            </form>
       </div>
        </center>
    </body>
</html>
